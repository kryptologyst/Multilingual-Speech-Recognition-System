# @package model

_target_: src.models.whisper_model.WhisperASRModel

model_name: "openai/whisper-base"
device: auto
torch_dtype: float16
use_flash_attention: false

# Model-specific parameters
max_length: 448
num_beams: 1
early_stopping: true
do_sample: false
temperature: 1.0
top_p: 1.0
repetition_penalty: 1.0
length_penalty: 1.0

# Language detection
enable_language_detection: true
default_language: "en"

# Post-processing
enable_punctuation: true
enable_casing: true
enable_numbers: true
